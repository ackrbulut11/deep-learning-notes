<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DeepSkyClassifier – Star type classification with PyTorch + FastAPI." />
  <title>DeepSky Classifier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- Starfield canvas -->
  <canvas id="starfield"></canvas>

  <!-- Scan line overlay -->
  <div class="scanlines"></div>

  <div class="app-shell">

    <!-- ══ LEFT PANEL ══ -->
    <aside class="panel panel-left">

      <div class="brand">
        <div class="brand-icon">◈</div>
        <div>
          <div class="brand-name">DEEPSKY</div>
          <div class="brand-sub">STELLAR CLASSIFIER v1.0</div>
        </div>
      </div>

      <div class="status-row">
        <span class="dot" id="statusDot"></span>
        <span class="mono" id="statusText">CONNECTING…</span>
      </div>

      <hr class="sep" />

      <!-- Input fields -->
      <form id="starForm" autocomplete="off">

        <div class="field">
          <label class="field-label">🌡 TEMPERATURE <span class="unit">(K)</span></label>
          <input class="field-input" type="number" id="temperature" min="1000" max="100000" step="any" value="3068" required />
        </div>

        <div class="field">
          <label class="field-label">💡 LUMINOSITY <span class="unit">(L/Lo)</span></label>
          <input class="field-input" type="number" id="luminosity" min="0.0001" max="849420" step="any" value="0.0024" required />
        </div>

        <div class="field">
          <label class="field-label">🔭 RADIUS <span class="unit">(R/Ro)</span></label>
          <input class="field-input" type="number" id="radius" min="0.001" max="2000" step="any" value="0.17" required />
        </div>

        <div class="field">
          <label class="field-label">✦ ABSOLUTE MAGNITUDE</label>
          <input class="field-input" type="number" id="magnitude" min="-15" max="25" step="any" value="16.12" required />
        </div>

        <div class="field">
          <label class="field-label">◉ COLOR</label>
          <select class="field-input" id="color">
            <option value="Red">Red</option>
            <option value="Blue">Blue</option>
            <option value="Blue-white">Blue-white</option>
            <option value="White">White</option>
            <option value="Yellowish White">Yellowish White</option>
            <option value="Yellow-white">Yellow-white</option>
            <option value="Pale yellow orange">Pale yellow orange</option>
            <option value="Orange">Orange</option>
            <option value="Orange-Red">Orange-Red</option>
            <option value="Whitish">Whitish</option>
          </select>
        </div>

        <div class="field">
          <label class="field-label">◈ SPECTRAL CLASS</label>
          <select class="field-input" id="spectralClass">
            <option value="M">M — Red (coolest)</option>
            <option value="K">K — Orange</option>
            <option value="G">G — Yellow</option>
            <option value="F">F — Yellow-white</option>
            <option value="A">A — White</option>
            <option value="B">B — Blue-white</option>
            <option value="O">O — Blue (hottest)</option>
          </select>
        </div>

        <hr class="sep" />

        <!-- Presets -->
        <div class="preset-label">QUICK LOAD</div>
        <div class="presets">
          <button type="button" class="preset-btn" id="preset-brown">🟤 Brown Dwarf</button>
          <button type="button" class="preset-btn" id="preset-red">🔴 Red Dwarf</button>
          <button type="button" class="preset-btn" id="preset-white">⚪ White Dwarf</button>
          <button type="button" class="preset-btn" id="preset-main">🌟 Main Sequence</button>
          <button type="button" class="preset-btn" id="preset-super">🌠 Supergiant</button>
          <button type="button" class="preset-btn" id="preset-hyper">💥 Hypergiant</button>
        </div>

        <button class="run-btn" type="submit" id="predictBtn">
          <span id="btnText">▶ RUN ANALYSIS</span>
          <span class="btn-spinner hidden" id="btnSpinner">◌</span>
        </button>

      </form>

    </aside>

    <!-- ══ RIGHT PANEL ══ -->
    <main class="panel panel-right">

      <!-- Idle state -->
      <div class="idle-state" id="idleState">
        <div class="idle-orb">
          <div class="orb-ring ring-1"></div>
          <div class="orb-ring ring-2"></div>
          <div class="orb-ring ring-3"></div>
          <div class="orb-core">◈</div>
        </div>
        <p class="idle-text">AWAITING STELLAR INPUT</p>
        <p class="idle-sub">Configure parameters on the left and run analysis</p>
      </div>

      <!-- Result state -->
      <div class="result-state hidden" id="resultState">

        <div class="result-header">
          <div class="result-icon" id="resultIcon">⭐</div>
          <div class="result-info">
            <div class="result-class" id="resultClass">—</div>
            <div class="result-conf">CONFIDENCE: <span id="confidenceValue" class="conf-pct">—</span></div>
          </div>
        </div>

        <div class="prob-section">
          <div class="prob-heading">◈ CLASSIFICATION MATRIX</div>
          <div id="probBars"></div>
        </div>

      </div>

      <!-- Error -->
      <div class="error-box hidden" id="errorToast">
        <span class="error-icon">⚠</span>
        <span id="errorMsg">An error occurred.</span>
      </div>

    </main>

  </div>

  <script src="/static/script.js"></script>
</body>
</html>
